<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nadine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Luxury Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* Minimal luxury gradient */
      background: linear-gradient(135deg, #0f0f0f, #2a2a2a);

      font-family: 'Playfair Display', serif;
    }

    .box {
      background: #ffffff;
      padding: 50px 100px;
      border-radius: 6px;

      /* soft shadow */
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);

      /* fade-in animation */
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1.2s ease forwards;

      cursor: pointer;
      transition: all 0.3s ease;
    }

    /* hover glow effect */
    .box:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 30px 80px rgba(255, 255, 255, 0.15);
    }

    .name {
      font-size: 56px;
      color: #000;
      letter-spacing: 3px;
      text-align: center;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .box {
        padding: 40px 60px;
      }

      .name {
        font-size: 40px;
      }
    }
  </style>
</head>

<body>

  <div class="box" onclick="goSomewhere()">
    <div class="name">Nadine</div>
  </div>

  <script>
    function goSomewhere() {
      // 🔗 CHANGE THIS LINK
      window.location.href = "https://wa.me/961XXXXXXXX"; 
      
      // Examples:
      // Instagram → https://instagram.com/username
      // Website → https://yourwebsite.com
      // WhatsApp → https://wa.me/961XXXXXXXX
    }
  </script>

</body>
</html>
